<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跳格子小游戏</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="score-display">
                分数: <span class="score-value" id="score">0</span>
                <span class="difficulty-display" id="difficulty">难度: 1</span>
            </div>
            <div class="power-bar-container">
                <div class="power-label">
                    <span>蓄力</span>
                    <span class="power-hint" id="powerHint"></span>
                </div>
                <div class="power-bar">
                    <div class="optimal-zone" id="optimalZone"></div>
                    <div class="power-fill" id="powerFill"></div>
                </div>
            </div>
        </div>
        <div class="game-area" id="gameArea">
            <div class="world-container" id="worldContainer">
                <div class="player" id="player"></div>
            </div>
            <div class="game-instructions" id="instructions">
                按住 <strong>空格</strong> 或 <strong>鼠标左键</strong> 蓄力，松开跳跃
            </div>
            <div class="game-overlay hidden" id="gameOverlay">
                <div class="overlay-title">游戏结束</div>
                <div class="overlay-score">本局分数: <span id="finalScore">0</span></div>
                <div class="overlay-reason" id="failReason"></div>
                <button class="restart-btn" id="restartBtn">重新开始</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
